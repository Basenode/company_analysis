  P4:
    name: "关联交易明细"
    location: "附注→关联方及关联交易"
    purpose: "商业模式（上下游关系）"
    report_section: "§2.3 异常数据"
    keywords:
      include: ["关联方交易", "关联交易", "关联方及关联交易", "重大关联交易", "关联方资金往来", "关联担保"]
      exclude: ["主营业务", "营收", "成本", "行业分析"]
      mandatory: ["关联方交易", "关联交易", "关联担保", "关联方资金往来"]
    extract_config:
      buffer_pages: 2
      max_chars: 6000

  P5:
    name: "主要客户与供应商"
    location: "第三节/附注"
    purpose: "商业模式（客户集中度）"
    report_section: "§1.3 竞争格局"
    keywords:
      include: ["前五名客户", "前五大客户", "主要客户", "客户集中度", "前五名供应商", "前五大供应商", "主要供应商"]
      exclude: ["主营业务", "产能", "在建工程"]
      mandatory: ["前五名客户", "前五名供应商", "客户集中度"]
