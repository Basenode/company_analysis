# 分析模块统一配置文件
# ============================
# 本文件是所有分析模块的"单一真相来源"（Single Source of Truth）
# 所有其他文件（pdf_config.py, coordinator_v2.md, pdf_parser.md, report_template.md）都从这里读取
# 新增/修改模块时，只需修改本文件，其他文件会自动同步

# ============================
# 一、PDF提取章节配置
# ============================

pdf_sections:
  # --- 第一部分：财报真实性校验 ---
  AUDIT:
    name: "审计报告"
    location: "开篇"
    purpose: "审计意见类型、关键审计事项"
    report_section: "§2.1 审计意见"
    keywords:
      include: ["审计报告", "审计意见", "标准无保留意见", "关键审计事项", "保留意见", "否定意见", "无法表示意见", "带强调事项段", "会计师事务所", "签字注册会计师"]
      exclude: ["主营业务", "经营情况", "行业分析", "未来规划", "财务报表项目注释"]
      mandatory: ["审计意见", "关键审计事项", "会计师事务所"]
    extract_config:
      buffer_pages: 3
      max_chars: 8000

  AUDIT_OPINION:
    name: "审计意见与关键审计事项"
    location: "第十节 财务报告→一、审计报告"
    purpose: "审计质量评级"
    report_section: "§2.1 审计意见"
    keywords:
      include: ["审计意见", "关键审计事项", "审计报告日期", "审计机构", "强调事项段", "其他信息段", "持续经营能力", "审计应对程序"]
      exclude: ["主营业务", "经营情况", "行业分析", "未来规划", "财务报表项目注释"]
      mandatory: ["审计意见", "关键审计事项"]
    extract_config:
      buffer_pages: 3
      max_chars: 8000

  ACCOUNTING_POLICY:
    name: "会计政策与会计估计"
    location: "第十节 财务报告→二、财务报表编制基础"
    purpose: "政策一致性核查"
    report_section: "§2.2 会计政策"
    keywords:
      include: ["会计政策变更", "会计估计变更", "重要会计政策", "重要会计估计", "收入确认政策", "坏账计提政策", "存货跌价政策", "固定资产折旧政策", "研发资本化政策", "前期差错更正"]
      exclude: ["主营业务明细", "营业收入", "营业成本", "产能产量", "行业分析"]
      mandatory: ["会计政策变更", "会计估计变更", "重要会计政策", "前期差错更正"]
    extract_config:
      buffer_pages: 4
      max_chars: 10000

  P1:
    name: "审计意见核查"
    location: "审计报告"
    purpose: "审计意见核查（精提取）"
    report_section: "§2.1 审计意见"
    keywords:
      include: ["审计意见类型", "审计机构名称", "审计费用", "连续审计年限", "审计报告日期", "关键审计事项", "强调事项段"]
      exclude: ["主营业务", "经营情况", "行业分析"]
      mandatory: ["审计意见类型", "审计机构", "关键审计事项"]
    extract_config:
      buffer_pages: 3
      max_chars: 8000

  P9:
    name: "会计政策一致性核查"
    location: "财务报表附注"
    purpose: "会计政策一致性（精提取）"
    report_section: "§2.2 会计政策"
    keywords:
      include: ["会计政策变更情况", "会计估计变更情况", "前期会计差错更正", "坏账计提比例", "存货跌价计提比例", "固定资产折旧年限", "研发资本化比例"]
      exclude: ["主营业务明细", "营业收入", "营业成本"]
      mandatory: ["会计政策变更", "会计估计变更", "前期差错更正", "坏账计提比例"]
    extract_config:
      buffer_pages: 4
      max_chars: 10000

  # --- 第二部分：核心财务三维度分析 ---
  BIZ_OVERVIEW:
    name: "公司简介/重要提示"
    location: "第一节"
    purpose: "基本信息、分红预案"
    report_section: "§1.1 主营业务"
    keywords:
      include: ["公司业务概要", "主营业务与产品", "主要产品及用途", "经营模式", "行业地位", "核心竞争力", "商业模式"]
      exclude: ["财务报表附注", "营业收入明细", "营业成本构成"]
      mandatory: ["主营业务", "经营模式", "核心竞争力", "行业地位"]
    extract_config:
      buffer_pages: 3
      max_chars: 10000

  BIZ:
    name: "核心竞争力分析"
    location: "第三节"
    purpose: "护城河、话语权支撑"
    report_section: "§1.1 主营业务"
    keywords:
      include: ["营业收入分产品", "主营业务分产品", "营业收入分行业", "分产品毛利率", "主营业务收入构成", "毛利率变动"]
      exclude: ["产能", "产量", "销量", "在建工程", "行业分析", "风险因素"]
      mandatory: ["分产品营收", "分地区营收", "营业成本", "毛利率"]
    extract_config:
      buffer_pages: 3
      max_chars: 8000

  CAP:
    name: "产能产量分析"
    location: "第三节"
    purpose: "产能利用率、产销率"
    report_section: "§1.1 主营业务"
    keywords:
      include: ["产能产量", "产能利用率", "产销率", "产量销量", "主要产品产量", "生产能力", "产能建设", "新增产能"]
      exclude: ["主营业务收入", "分产品营收", "在建工程预算", "行业分析"]
      mandatory: ["产能利用率", "产销率", "产量", "销量"]
    extract_config:
      buffer_pages: 2
      max_chars: 6000

  CUS:
    name: "客户与供应商情况"
    location: "第三节"
    purpose: "客户集中度、供应商集中度"
    report_section: "§1.3 竞争格局"
    keywords:
      include: ["前五名客户", "前五大客户", "主要客户", "客户集中度", "前五名供应商", "前五大供应商", "主要供应商", "供应商集中度"]
      exclude: ["主营业务", "产能", "在建工程", "行业分析"]
      mandatory: ["前五名客户", "前五名供应商", "客户集中度", "供应商集中度"]
    extract_config:
      buffer_pages: 2
      max_chars: 5000

  INV:
    name: "存货附注"
    location: "财务报表附注"
    purpose: "库龄、跌价准备"
    report_section: "模块1 资产负债表"
    keywords:
      include: ["存货分类", "存货明细", "存货构成", "存货库龄", "存货跌价准备", "原材料库存", "库存商品"]
      exclude: ["主营业务", "营收", "产能", "客户", "应收账款"]
      mandatory: ["存货分类", "存货跌价准备", "存货库龄"]
