# ============================
# 五、校验规则配置
# ============================

validation_rules:
  pdf_sections:
    required_sections: ["BIZ", "MDA_INDUSTRY", "MDA_OPERATION"]
    optional_sections: ["P1", "P9", "P2", "P3", "P4", "P5", "P6", "P7", "P8", "P13", "SUB"]

  data_pack:
    required_sections: ["§1", "§3", "§4", "§5", "§9", "§12"]
    min_years: 3

  web_search:
    required_tier1_items: 25  # 第一优先级必须完成25项
    required_tier2_items: 0   # 第二优先级可选
    required_tier3_items: 0   # 第三优先级根据行业选择

  report:
    required_parts: ["part1", "part2"]
    optional_parts: ["part3", "part4", "part5", "part6"]
