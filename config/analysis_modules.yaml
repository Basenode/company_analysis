        output: "市场预期"

# ============================
# 三、报告章节配置
# ============================

report_sections:
  - id: "part1"
    name: "分析前置准备与财报真实性校验"
    subsections:
      - id: "1.1"
        name: "核心主营业务与商业模式"
        data_sources: ["data_pack§9", "pdf_sections[BIZ]", "web_search[1.1-1.4]"]
      - id: "1.2"
        name: "所属细分赛道与行业属性"
        data_sources: ["data_pack§1", "web_search[1.5-1.6]"]
      - id: "1.3"
        name: "竞争格局与行业地位"
        data_sources: ["web_search[1.7-1.10]", "pdf_sections[MDA_INDUSTRY]"]
      - id: "1.4"
        name: "分析目标锚定"
        data_sources: ["web_search[1.11-1.15]", "pdf_sections[MDA_OUTLOOK]"]
      - id: "2.1"
        name: "审计意见核查"
        data_sources: ["data_pack§7", "pdf_sections[AUDIT]", "web_search[2.1-2.3]"]
      - id: "2.2"
        name: "会计政策与估计一致性核查"
